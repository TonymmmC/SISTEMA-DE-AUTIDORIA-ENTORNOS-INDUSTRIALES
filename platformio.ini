; PlatformIO Project Configuration File
;
; Edge101 Industrial ESP32 IoT Controller (DFR0886)
; ESP32-D0WDQ6 Dual-Core, 16MB Flash, RMII Ethernet (IP101GRI)

[platformio]
default_envs = edge101
src_dir = src

[env:edge101]
platform = espressif32@^6.7.0
board = esp32dev
framework = arduino

; 16MB flash con OTA dual app + LittleFS para activos del dashboard
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_upload.flash_size = 16MB

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, default
upload_speed = 921600

build_flags =
  -I include
  -D CORE_DEBUG_LEVEL=3
  -D CONFIG_ARDUHAL_LOG_COLORS=1
  -Wall
  -Wextra
  -Werror=return-type

lib_deps =
  bblanchon/ArduinoJson@^7.1.0
  esp32async/ESPAsyncWebServer@^3.6.0
  esp32async/AsyncTCP@^3.3.2
  h2zero/NimBLE-Arduino@^1.4.2

; Tests unitarios de funciones puras (CRC-16, parser Modbus) en la maquina host.
; No requiere hardware: `pio test -e native`.
[env:native]
platform = native
build_flags =
  -I lib/edge_modbus/include
  -std=gnu++17
